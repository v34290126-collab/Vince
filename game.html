<main>

<h1 class="title">Find the Heart 🎮</h1>
<p style="text-align:center;color:var(--muted)">One of these tiles is hiding my heart for you.</p>
<div class="grid-game" id="grid"></div>
<p class="status" id="status">Pick a tile...</p>
<div style="text-align:center;margin-top:1rem"><button class="btn" onclick="newGame()">New Game</button></div>

</main>
<footer>Made with <span style="color:var(--primary)">💚</span> for you</footer>
<script src="script.js"></script>
<script>
const grid=document.getElementById('grid'),status=document.getElementById('status');
const SIZE=24;
function newGame(){
  grid.innerHTML='';
  const heart=Math.floor(Math.random()*SIZE);
  for(let i=0;i<SIZE;i++){
    const b=document.createElement('button');b.textContent='❔';
    b.onclick=()=>{
      if(i===heart){b.textContent='💚';status.textContent='You found my heart! 💚 (it was always yours)';}
      else{b.textContent='✨';status.textContent='Not here... keep going 💕';}
    };
    grid.appendChild(b);
  }
  status.textContent='Pick a tile...';
}
newGame();
</script>
