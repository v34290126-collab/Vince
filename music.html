<main>

<h1 class="title">Our Playlist 🎵</h1>
<div class="glass music" style="margin-top:2rem">
  <h2 style="margin-bottom:.2rem">Our Song</h2>
  <p style="color:var(--muted)">Press play and close your eyes 💚</p>
  <div class="viz paused" id="viz"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <button class="btn" id="playBtn">▶ Play</button>
  <p style="margin-top:1.2rem;font-family:Dancing Script,cursive;font-size:1.4rem;color:var(--soft)" id="lyric">"Every love song is about you."</p>
  <audio id="bgMusic">
  <source src="Libu-Libong Buwan (Uuwian) - Kyle Raphael (Lyric Video).mp3" type="audio/mpeg">
</audio>
  
</div>

</main>
<footer>Made with <span style="color:var(--primary)">💚</span> for you</footer>
<script>
const btn = document.getElementById('playBtn');
const viz = document.getElementById('viz');
const music = document.getElementById('bgMusic');

let playing = false;

btn.onclick = () => {
  playing = !playing;

  if (playing) {
    music.play();
    btn.textContent = '❚❚ Pause';
  } else {
    music.pause();
    btn.textContent = '▶ Play';
  }

  viz.classList.toggle('paused', !playing);
};
</script>
